name: Smart CI/CD Pipeline

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:


jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          pip install pytest flake8
      - name: Python Lint
        run: |
          if ls **/*.py 1> /dev/null 2>&1; then flake8 .; fi
      - name: Python Tests
        run: |
          if [ -d "tests" ]; then pytest; fi

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Node deps
        run: |
          if [ -f "package.json" ]; then npm install; fi
      - name: Node Lint
        run: |
          if [ -f "package.json" ]; then npm run lint || true; fi
      - name: Node Tests
        run: |
          if [ -f "package.json" ]; then npm test || true; fi

  docker:
    runs-on: ubuntu-latest
    needs: [python, node]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          if [ -f "Dockerfile" ]; then docker build -t ghcr.io/${{ github.repository }}:latest .; fi

  release:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build release image
        run: |
          if [ -f "Dockerfile" ]; then docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .; fi
      - name: Push release image
        run: |
          if [ -f "Dockerfile" ]; then docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}; fi
